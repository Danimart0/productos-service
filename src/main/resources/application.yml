server:
  port: 8081
spring:
  application:
    name: productos-service
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/productos_db}
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
management:
  endpoints:
    web:
      exposure:
        include: "*"
